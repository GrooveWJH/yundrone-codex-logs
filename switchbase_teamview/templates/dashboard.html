<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/dashboard.css">
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">TeamView Usage Board</p>
          <h1>成员用量与排行榜</h1>
          <p class="subhead">统一查看固定时间段用量、日榜/周榜/月榜和邮箱主键别名。</p>
        </div>
        <div class="hero-stats" id="summaryCards">
          <article class="stat-card">
            <span>成员总数</span>
            <strong id="statMembers">-</strong>
          </article>
          <article class="stat-card">
            <span>请求次数</span>
            <strong id="statRequests">-</strong>
          </article>
          <article class="stat-card">
            <span>消耗 Tokens</span>
            <strong id="statTokens">-</strong>
          </article>
        </div>
      </header>

      <section class="toolbar">
        <div class="preset-group" id="presetGroup">
          {% for value, label in preset_options %}
          <button class="preset-button" data-preset="{{ value }}">{{ label }}</button>
          {% endfor %}
        </div>
        <div class="custom-range">
          <label>
            <span>开始</span>
            <input type="date" id="customStart">
          </label>
          <label>
            <span>结束</span>
            <input type="date" id="customEnd">
          </label>
          <button class="ghost-button" id="applyCustomRange">应用自定义</button>
        </div>
        <label class="search-field">
          <span>搜索成员</span>
          <input type="search" id="memberSearch" placeholder="别名 / 用户名 / 邮箱">
        </label>
      </section>

      <div id="errorBanner" class="error-banner hidden"></div>

      <main class="board">
        <section class="panel panel-table">
          <div class="panel-head">
            <div>
              <p class="panel-kicker" id="currentRangeLabel">当前范围</p>
              <h2>成员用量表</h2>
            </div>
            <span class="pill" id="memberCountPill">0 人</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>别名</th>
                  <th>用户名</th>
                  <th>邮箱</th>
                  <th>角色</th>
                  <th>用户组</th>
                  <th>请求次数</th>
                  <th>消耗 Tokens</th>
                  <th>累计已用 Quota</th>
                </tr>
              </thead>
              <tbody id="memberTableBody"></tbody>
            </table>
          </div>
        </section>

        <aside class="sidebar">
          <section class="panel panel-ranking">
            <div class="panel-head compact">
              <h2>总量排行榜</h2>
              <span class="pill">Top 10</span>
            </div>
            <div class="ranking-columns">
              <div class="ranking-card">
                <h3>日榜</h3>
                <ol id="dailyRanking"></ol>
              </div>
              <div class="ranking-card">
                <h3>周榜</h3>
                <ol id="weeklyRanking"></ol>
              </div>
              <div class="ranking-card">
                <h3>月榜</h3>
                <ol id="monthlyRanking"></ol>
              </div>
            </div>
          </section>
        </aside>
      </main>
    </div>
    <script src="/static/dashboard.js"></script>
  </body>
</html>
